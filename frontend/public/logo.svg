<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="streamGrad" x1="60" y1="140" x2="340" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="50%" stop-color="#00AAFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="80" y1="200" x2="320" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050A14"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="200,30 358,115 358,285 200,370 42,285 42,115"/>
    </clipPath>
  </defs>

  <!-- Hexagon background -->
  <polygon points="200,30 358,115 358,285 200,370 42,285 42,115" fill="url(#bgGrad)" stroke="url(#streamGrad)" stroke-width="2.5"/>

  <!-- Subtle hex inner ring -->
  <polygon points="200,54 338,127 338,273 200,346 62,273 62,127" fill="none" stroke="#0066FF" stroke-width="0.8" opacity="0.3"/>

  <!-- Stream lines — flowing S-curve through hex -->
  <!-- Upper arc: left to right -->
  <path d="M 95 165 C 120 130, 175 120, 200 148 C 225 176, 268 180, 305 155"
        stroke="url(#streamGrad)" stroke-width="12" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Lower arc: right to left (completing S) -->
  <path d="M 95 245 C 132 220, 175 220, 200 248 C 225 276, 275 268, 305 240"
        stroke="url(#streamGrad)" stroke-width="12" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Gold yield accent bar — horizontal stability line -->
  <rect x="110" y="196" width="180" height="6" rx="3" fill="url(#accentGrad)" filter="url(#glow)"/>

  <!-- Arrowhead on upper stream -->
  <polygon points="305,155 288,143 290,163" fill="#00D4FF" filter="url(#glow)"/>

  <!-- Arrowhead on lower stream -->
  <polygon points="305,240 288,228 290,252" fill="#00AAFF" filter="url(#glow)"/>

  <!-- Left node dot -->
  <circle cx="95" cy="165" r="6" fill="#0066FF"/>
  <circle cx="95" cy="245" r="6" fill="#0066FF"/>

  <!-- Center convergence dot -->
  <circle cx="200" cy="200" r="8" fill="#FFB800" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="4" fill="#FFFFFF"/>
</svg>
