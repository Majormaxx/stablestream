[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "v4-core/=lib/v4-core/",
    "v4-periphery/=lib/v4-periphery/",
    "@uniswap/v4-core/=lib/v4-core/",
    "@openzeppelin/contracts/=lib/v4-core/lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "solmate/=lib/v4-core/lib/solmate/",
]

# Unichain Sepolia — for testnet fork tests
[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC}"
unichain = "${UNICHAIN_RPC}"

[fuzz]
runs = 1000
seed = "0x1"

[invariant]
runs = 256
depth = 15

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
